<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Grilos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <h1>Contador de Grilos - Detecção por OpenCV.js</h1>
    <p>Carregue uma imagem de grilos e processe com detecção automática.</p>
    <input type="file" id="imageInput" accept="image/*">
    <button id="processBtn">Processar Imagem</button>
    <div id="controls">
        <label>Threshold: <input type="range" id="threshold" min="0" max="255" value="100"> <span id="threshVal">100</span></label><br>
        <label>Área Mínima: <input type="range" id="minArea" min="10" max="300" value="30"> <span id="areaVal">30</span></label>
    </div>
    <canvas id="canvas" style="max-width:100%; border:2px solid #333;"></canvas>
    <div id="result">Contagem estimada: <span id="count">0</span></div>
    <script src="app.js"></script>
</body>
</html>
