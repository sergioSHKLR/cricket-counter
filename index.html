<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Grilos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <h1>Contador de Grilos - Detecção por OpenCV.js</h1>
    <p id="status">Carregando OpenCV.js... Por favor, aguarde.</p>
    <input type="file" id="imageInput" accept="image/*">
    <button id="processBtn">Processar Imagem</button>
    <div id="controls">
        <label>Threshold: <input type="range" id="threshold" min="0" max="255" value="80"> <span id="threshValue">80</span></label>
        <label>Área Mínima: <input type="range" id="minArea" min="10" max="500" value="30"> <span id="areaValue">30</span></label>
    </div>
    <canvas id="canvas" width="800" height="600"></canvas>
    <div id="result">Contagem estimada: <span id="count">0</span></div>
    <script src="https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.10.0-release.1/opencv.js"></script>
    <script src="opencv.js"></script>
</body>
</html>
